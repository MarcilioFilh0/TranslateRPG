<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tradutor de Idiomas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tradutor de Idiomas</h1>
    
    <div>
        <label for="seletor-fonte">Escolha o Idioma:</label>
        <select id="seletor-fonte">
            <option value="fonte-comum">Comum</option>
            <option value="fonte-ana">Anão</option>
            <option value="fonte-draconica">Dracônico</option>
            <option value="fonte-elfica">Élfico</option>
            <option value="fonte-infernal">Infernal</option>
        </select>
        
        <textarea id="entrada" placeholder="Digite em comum..."></textarea>
        <h3 id="saida" placeholder="O resultado aparecerá aqui:"></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
